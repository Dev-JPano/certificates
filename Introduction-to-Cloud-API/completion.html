<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Course Completion</title>

<style>
:root{
  --blue:#0b5ed7;
  --dark:#073b8e;
  --orange:#ff8a00;
  --soft:#eef6ff;
  --line:#dbe7f7;
  --text:#172033;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:20px;
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at top left,rgba(11,94,215,.18),transparent 35%),
    radial-gradient(circle at bottom right,rgba(255,138,0,.18),transparent 35%),
    linear-gradient(135deg,#f7fbff,#edf5ff,#fff);
  color:var(--text);
}

.card{
  width:min(960px,100%);
  background:rgba(255,255,255,.92);
  border:1px solid var(--line);
  border-radius:30px;
  overflow:hidden;
  text-align:center;
  box-shadow:0 28px 80px rgba(7,59,142,.18);
}

.top{
  height:10px;
  background:linear-gradient(90deg,var(--blue),#00a3ff,var(--orange));
}

.content{
  padding:clamp(28px,6vw,64px);
}

.badge{
  display:inline-block;
  padding:9px 16px;
  border-radius:999px;
  background:var(--soft);
  color:var(--dark);
  font-size:12px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
}

h1{
  margin:24px 0 8px;
  font-size:clamp(38px,7vw,68px);
  color:var(--dark);
  line-height:1;
}

.subtitle{
  color:#6b7280;
  font-size:clamp(15px,2vw,19px);
  margin:0;
}

.name{
  display:block;
  margin:12px 0;
  font-size:clamp(30px,5vw,48px);
  font-weight:900;
  color:var(--blue);
}

.course{
  margin:30px auto 14px;
  padding:20px;
  border:1px solid var(--line);
  border-radius:22px;
  background:linear-gradient(135deg,#f0f7ff,#fff);
  font-size:clamp(21px,3vw,32px);
  font-weight:900;
}

.site{
  display:inline-block;
  margin-top:6px;
  color:var(--blue);
  font-weight:800;
  text-decoration:none;
  word-break:break-word;
  transition:.25s ease;
}

.site:hover{
  color:var(--orange);
  transform:translateY(-1px);
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin:32px 0;
}

.box{
  padding:22px;
  border:1px solid var(--line);
  border-radius:22px;
  background:#fff;
  box-shadow:0 10px 26px rgba(7,59,142,.08);
  transition:.25s ease;
}

.box:hover{
  transform:translateY(-5px);
  box-shadow:0 18px 36px rgba(7,59,142,.14);
}

.label{
  font-size:12px;
  color:#6b7280;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.value{
  margin-top:8px;
  font-size:clamp(25px,4vw,36px);
  font-weight:900;
  color:var(--dark);
}

.date{
  margin-top:10px;
  font-weight:800;
  font-size:clamp(15px,2vw,18px);
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-top:32px;
  min-height:48px;
  padding:0 24px;
  border-radius:999px;
  background:var(--blue);
  color:#fff;
  text-decoration:none;
  font-weight:900;
  box-shadow:0 14px 28px rgba(11,94,215,.25);
  transition:.25s ease;
}

.btn:hover{
  background:var(--orange);
  transform:translateY(-3px);
  box-shadow:0 18px 36px rgba(255,138,0,.28);
}

@media(max-width:640px){
  body{padding:14px}
  .card{border-radius:24px}
  .content{padding:30px 18px}
  .stats{grid-template-columns:1fr}
  .btn{width:100%}
}
</style>
</head>

<body>
  <main class="card">
    <div class="top"></div>

    <section class="content">
      <div class="badge">Course Completion</div>

      <h1>Congratulations</h1>

      <p class="subtitle">
        Congratulations to
        <span class="name">Jhon Anthony Pano</span>
        for completing the course
      </p>

      <div class="course">Introduction to Cloud API</div>

      <a class="site" href="https://olympus.mygreatlearning.com/" target="_blank">
        olympus.mygreatlearning.com
      </a>

      <div class="stats">
        <div class="box">
          <div class="label">Progress</div>
          <div class="value">100%</div>
        </div>

        <div class="box">
          <div class="label">Score</div>
          <div class="value">5/5</div>
        </div>

        <div class="box">
          <div class="label">Attempt</div>
          <div class="value">2/3</div>
        </div>
      </div>

      <div class="date">May 05, 2026 | 12:05:37</div>

      <a class="btn" href="https://olympus.mygreatlearning.com/" target="_blank">
        Open Olympus Great Learning
      </a>
    </section>
  </main>
</body>
</html>
