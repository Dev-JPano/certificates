<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Course Completion</title>

<style>
:root{
  --green:#00a651;
  --dark-green:#007a3d;
  --deep:#123524;
  --soft:#eaf8f0;
  --line:#d8eee1;
  --text:#1f2933;
  --muted:#6b7280;
  --white:#ffffff;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:20px;
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at top left,rgba(0,166,81,.18),transparent 34%),
    radial-gradient(circle at bottom right,rgba(0,122,61,.14),transparent 36%),
    linear-gradient(135deg,#f7fff9,#edf9f2,#ffffff);
  color:var(--text);
}

.card{
  width:min(900px,100%);
  background:rgba(255,255,255,.96);
  border:1px solid var(--line);
  border-radius:26px;
  overflow:hidden;
  text-align:center;
  box-shadow:0 26px 70px rgba(0,122,61,.16);
}

.top{
  padding:22px;
  background:linear-gradient(135deg,var(--green),var(--dark-green));
  color:#fff;
}

.brand{
  font-size:clamp(26px,4vw,42px);
  font-weight:900;
  letter-spacing:.02em;
}

.content{
  padding:clamp(28px,6vw,60px);
}

.badge{
  display:inline-block;
  padding:9px 18px;
  border-radius:999px;
  background:var(--soft);
  color:var(--dark-green);
  font-size:12px;
  font-weight:900;
  letter-spacing:.14em;
  text-transform:uppercase;
}

h1{
  margin:26px 0 10px;
  font-size:clamp(36px,7vw,64px);
  color:var(--deep);
  line-height:1;
}

.subtitle{
  color:var(--muted);
  font-size:clamp(15px,2vw,19px);
  margin:0;
}

.name{
  display:block;
  margin:12px 0;
  font-size:clamp(30px,5vw,48px);
  font-weight:900;
  color:var(--green);
}

.course{
  margin:32px auto 16px;
  padding:24px;
  border:1px solid var(--line);
  border-radius:20px;
  background:linear-gradient(135deg,#f2fbf6,#ffffff);
  font-size:clamp(22px,3vw,34px);
  font-weight:900;
  color:var(--deep);
  box-shadow:0 12px 30px rgba(0,122,61,.08);
}

.site{
  display:inline-block;
  margin-top:6px;
  color:var(--dark-green);
  font-weight:800;
  text-decoration:none;
  word-break:break-word;
  transition:.25s ease;
}

.site:hover{
  color:var(--green);
  transform:translateY(-1px);
}

.stats{
  display:grid;
  grid-template-columns:1fr;
  max-width:360px;
  margin:34px auto 28px;
}

.box{
  padding:24px;
  border:1px solid var(--line);
  border-radius:20px;
  background:#fff;
  box-shadow:0 10px 26px rgba(0,122,61,.08);
  transition:.25s ease;
}

.box:hover{
  transform:translateY(-5px);
  box-shadow:0 18px 38px rgba(0,122,61,.14);
}

.label{
  font-size:12px;
  color:var(--muted);
  font-weight:900;
  letter-spacing:.14em;
  text-transform:uppercase;
}

.value{
  margin-top:8px;
  font-size:clamp(34px,5vw,48px);
  font-weight:900;
  color:var(--green);
}

.date{
  margin-top:10px;
  font-weight:800;
  font-size:clamp(15px,2vw,18px);
  color:var(--deep);
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-top:32px;
  min-height:50px;
  padding:0 28px;
  border-radius:999px;
  background:var(--green);
  color:#fff;
  text-decoration:none;
  font-weight:900;
  box-shadow:0 14px 28px rgba(0,166,81,.25);
  transition:.25s ease;
}

.btn:hover{
  background:var(--dark-green);
  transform:translateY(-3px);
  box-shadow:0 18px 36px rgba(0,122,61,.28);
}

@media(max-width:640px){
  body{padding:14px}
  .card{border-radius:22px}
  .top{padding:18px}
  .content{padding:30px 18px}
  .btn{width:100%}
}
</style>
</head>

<body>
  <main class="card">
    <div class="top">
      <div class="brand">Alison</div>
    </div>

    <section class="content">
      <div class="badge">Course Completion</div>

      <h1>Congratulations</h1>

      <p class="subtitle">
        Congratulations to
        <span class="name">Jhon Anthony Pano</span>
        for completing the course
      </p>

      <div class="course">Fundamentals of HIPAA Law and Its Privacy Rules</div>

      <a class="site" href="https://alison.com/" target="_blank">
        alison.com
      </a>

      <div class="stats">
        <div class="box">
          <div class="label">Progress</div>
          <div class="value">100%</div>
        </div>
      </div>

      <div class="date">May 05, 2026 | 19:13:21</div>

      <a class="btn" href="https://alison.com/" target="_blank">
        Open Alison
      </a>
    </section>
  </main>
</body>
</html>
